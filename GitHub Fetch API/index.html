<!DOCTYPE html>
<html lang="en">

<head>

    <title>Git Hub Fetch Api Project</title>
    <link href="style.css" rel="stylesheet">

<body>

    <h1>Git Hub Fetch Api Project</h1>

</body>
<script src="app.js"> </script>
